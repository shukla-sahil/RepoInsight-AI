<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="code" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#e0e7ff" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="32" y="32" width="448" height="448" rx="96" ry="96" fill="url(#bg)"/>
  <!-- Code brackets < / > -->
  <g fill="none" stroke="url(#code)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left bracket < -->
    <polyline points="200,160 130,256 200,352"/>
    <!-- Right bracket > -->
    <polyline points="312,160 382,256 312,352"/>
    <!-- Forward slash / -->
    <line x1="280" y1="140" x2="232" y2="372"/>
  </g>
  <!-- Small sparkle/insight dot -->
  <circle cx="390" cy="140" r="24" fill="#fbbf24" opacity="0.9"/>
  <circle cx="390" cy="140" r="12" fill="#ffffff" opacity="0.8"/>
</svg>
